<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Smitty Machine 🎰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0015;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Exo 2',sans-serif;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(120,40,200,0.3) 0%,transparent 60%),radial-gradient(ellipse at 50% 100%,rgba(200,100,0,0.2) 0%,transparent 60%);pointer-events:none}
  #machine{max-width:520px;width:100%;margin:1rem auto;padding:0 1rem 2rem}
  #cabinet{background:linear-gradient(180deg,#1a0030 0%,#0f001e 40%,#1a0030 100%);border-radius:24px;border:3px solid #c8922a;padding:1.5rem 1.25rem 1.5rem;position:relative;overflow:hidden}
  #cabinet::before{content:'';position:absolute;inset:0;border-radius:21px;border:1px solid rgba(200,146,42,0.2);pointer-events:none}
  #title-wrap{text-align:center;margin-bottom:1.25rem}
  #title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#c8922a;letter-spacing:4px;text-shadow:0 0 20px rgba(200,146,42,0.6),0 0 40px rgba(200,146,42,0.3)}
  #subtitle{font-family:'Orbitron',monospace;font-size:10px;color:#8a6aaa;letter-spacing:5px;margin-top:3px}
  #credits-bar{display:flex;justify-content:space-between;background:rgba(0,0,0,0.5);border:1px solid rgba(200,146,42,0.25);border-radius:10px;padding:8px 16px;margin-bottom:1rem}
  .cred-group{text-align:center}
  .cred-label{font-size:10px;color:#8a6aaa;letter-spacing:2px;text-transform:uppercase}
  .cred-val{font-family:'Orbitron',monospace;font-size:20px;color:#c8922a;font-weight:700}
  #win-msg{text-align:center;min-height:30px;font-family:'Orbitron',monospace;font-size:14px;color:#c8922a;margin-bottom:0.75rem;letter-spacing:1px;transition:all 0.3s}
  #reels-wrap{display:flex;gap:6px;background:rgba(0,0,0,0.7);border-radius:14px;padding:10px 8px;border:2px solid rgba(200,146,42,0.25);margin-bottom:1rem;position:relative}
  #payline{position:absolute;top:50%;left:0;right:0;height:76px;transform:translateY(-50%);border-top:2px solid rgba(200,146,42,0.5);border-bottom:2px solid rgba(200,146,42,0.5);pointer-events:none;z-index:5}
  .reel{flex:1;height:228px;overflow:hidden;border-radius:8px;background:#060010;border:1px solid rgba(200,146,42,0.15);position:relative}
  .strip{display:flex;flex-direction:column;will-change:transform}
  .cell{height:76px;display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0}
  .cell.smitty{background:rgba(200,146,42,0.07)}
  .smitty-img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2.5px solid #c8922a}
  #controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.875rem}
  .bet-row{grid-column:1/-1;display:flex;align-items:center;gap:10px}
  .bet-row label{font-size:11px;color:#8a6aaa;text-transform:uppercase;letter-spacing:1px;flex-shrink:0;font-family:'Orbitron',monospace}
  .bet-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:rgba(200,146,42,0.25);border-radius:2px;outline:none}
  .bet-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#c8922a;cursor:pointer}
  .bet-row span{font-family:'Orbitron',monospace;font-size:16px;color:#c8922a;min-width:28px;text-align:right}
  .btn-small{padding:9px 8px;background:transparent;color:#8a6aaa;border:1px solid rgba(138,106,170,0.4);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all 0.15s}
  .btn-small:hover{background:rgba(138,106,170,0.1);color:#c8922a;border-color:#c8922a}
  #spin-btn{grid-column:1/-1;padding:15px;background:#c8922a;color:#0a0015;border:none;border-radius:12px;font-family:'Orbitron',monospace;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:transform 0.1s,background 0.15s}
  #spin-btn:hover{background:#e0a830}
  #spin-btn:active{transform:scale(0.97)}
  #spin-btn:disabled{background:#3a2a1a;color:#665544;cursor:not-allowed}
  #paytable{background:rgba(0,0,0,0.4);border-radius:10px;padding:10px 14px;border:1px solid rgba(200,146,42,0.15)}
  #paytable h3{font-family:'Orbitron',monospace;font-size:9px;color:#c8922a;letter-spacing:3px;margin-bottom:8px}
  .pay-row{display:flex;justify-content:space-between;padding:2px 0}
  .pay-sym{font-size:12px;color:#8a6aaa}
  .pay-amt{font-family:'Orbitron',monospace;font-size:11px;color:#c8922a}
  #jackpot-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  #jackpot-overlay.show{display:flex}
  #jk-img{width:130px;height:130px;border-radius:50%;object-fit:cover;border:4px solid #c8922a;margin-bottom:1rem;animation:jk-pulse 0.5s ease-in-out infinite alternate}
  @keyframes jk-pulse{from{box-shadow:0 0 20px rgba(200,146,42,0.5)}to{box-shadow:0 0 60px rgba(200,146,42,0.9),0 0 120px rgba(200,146,42,0.4)}}
  #jk-title{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:#c8922a;text-shadow:0 0 30px rgba(200,146,42,0.8);margin-bottom:0.5rem;animation:jk-blink 0.3s ease-in-out infinite alternate}
  @keyframes jk-blink{from{opacity:1}to{opacity:0.7}}
  #jk-sub{font-size:18px;color:#fff;margin-bottom:0.75rem}
  #jk-amount{font-family:'Orbitron',monospace;font-size:32px;color:#ffd700;margin-bottom:1.5rem}
  #jk-close{padding:14px 36px;background:#c8922a;color:#0a0015;border:none;border-radius:12px;font-family:'Orbitron',monospace;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px}
  .confetti{position:fixed;z-index:300;pointer-events:none;animation:cffall linear forwards}
  @keyframes cffall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  .win-glow{animation:winglow 0.4s ease-in-out 3}
  @keyframes winglow{0%,100%{background:rgba(0,0,0,0.7)}50%{background:rgba(200,146,42,0.12)}}
</style>
</head>
<body>

<div id="machine">
  <div id="cabinet">
    <div id="title-wrap">
      <div id="title">THE SMITTY</div>
      <div id="subtitle">★ DELUXE EDITION ★</div>
    </div>

    <div id="credits-bar">
      <div class="cred-group"><div class="cred-label">Credits</div><div class="cred-val" id="cval">100</div></div>
      <div class="cred-group"><div class="cred-label">Bet</div><div class="cred-val" id="bval">5</div></div>
      <div class="cred-group"><div class="cred-label">Win</div><div class="cred-val" id="wval">0</div></div>
    </div>

    <div id="win-msg">Good luck, mate! 🍺</div>

    <div id="reels-wrap">
      <div id="payline"></div>
      <div class="reel"><div class="strip" id="s0"></div></div>
      <div class="reel"><div class="strip" id="s1"></div></div>
      <div class="reel"><div class="strip" id="s2"></div></div>
      <div class="reel"><div class="strip" id="s3"></div></div>
      <div class="reel"><div class="strip" id="s4"></div></div>
    </div>

    <div id="controls">
      <div class="bet-row">
        <label>Bet</label>
        <input type="range" id="bet-slider" min="1" max="20" value="5" step="1">
        <span id="bet-disp">5</span>
      </div>
      <button class="btn-small" id="max-btn">Max Bet</button>
      <button class="btn-small" id="add-btn">+ 100 Credits</button>
      <button id="spin-btn">SPIN</button>
    </div>

    <div id="paytable">
      <h3>Paytable — multiplier × bet</h3>
      <div class="pay-row"><span class="pay-sym">😎 SMITTY × 5</span><span class="pay-amt">JACKPOT × 500</span></div>
      <div class="pay-row"><span class="pay-sym">😎 SMITTY × 4</span><span class="pay-amt">× 100</span></div>
      <div class="pay-row"><span class="pay-sym">😎 SMITTY × 3</span><span class="pay-amt">× 25</span></div>
      <div class="pay-row"><span class="pay-sym">💰 × 5</span><span class="pay-amt">× 50</span></div>
      <div class="pay-row"><span class="pay-sym">⭐ × 5</span><span class="pay-amt">× 20</span></div>
      <div class="pay-row"><span class="pay-sym">🍺 × 5</span><span class="pay-amt">× 10</span></div>
      <div class="pay-row"><span class="pay-sym">🎰 × 5</span><span class="pay-amt">× 8</span></div>
      <div class="pay-row"><span class="pay-sym">🃏 × 5</span><span class="pay-amt">× 5</span></div>
      <div class="pay-row"><span class="pay-sym">Any 3+ matching</span><span class="pay-amt">× 2</span></div>
    </div>
  </div>
</div>

const SYMS = ['🍺','🎰','💰','🃏','⭐','SMITTY'];
const WEIGHTS = [22,16,11,20,16,4];
const CELL_H = 76;
const NREELS = 5;
let credits=100, bet=5, spinning=false;

function wRand(){
  const tot=WEIGHTS.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot;
  for(let i=0;i<SYMS.length;i++){r-=WEIGHTS[i];if(r<=0)return SYMS[i];}
  return SYMS[0];
}

function makeCell(sym){
  const d=document.createElement('div');
  d.className='cell'+(sym==='SMITTY'?' smitty':'');
  if(sym==='SMITTY'){
    const img=document.createElement('img');
    img.src=PHOTO; img.className='smitty-img';
    d.appendChild(img);
  } else { d.textContent=sym; }
  return d;
}

function buildStrip(el,final){
  el.innerHTML='';
  const n=26;
  const syms=[];
  for(let i=0;i<n-3;i++) syms.push(wRand());
  syms.push(wRand(),final,wRand());
  syms.forEach(s=>el.appendChild(makeCell(s)));
  return syms;
}

function initReels(){
  for(let i=0;i<NREELS;i++){
    const s=document.getElementById('s'+i);
    s.innerHTML='';
    for(let j=0;j<6;j++) s.appendChild(makeCell(wRand()));
  }
}

function calcWin(res){
  const c={};
  res.forEach(s=>{c[s]=(c[s]||0)+1;});
  const sc=c['SMITTY']||0;
  if(sc===5) return {mult:500,msg:'🚨 JACKPOT — SMITTY × 5! 🚨',jackpot:true};
  if(sc===4) return {mult:100,msg:'😎 SMITTY × 4 — Massive win!',jackpot:false};
  if(sc===3) return {mult:25, msg:'😎 SMITTY × 3 — Beauty!',jackpot:false};
  if((c['💰']||0)>=5) return {mult:50,msg:'💰 Money Money Money!',jackpot:false};
  if((c['⭐']||0)>=5) return {mult:20,msg:'⭐ Stars Align!',jackpot:false};
  if((c['🍺']||0)>=5) return {mult:10,msg:'🍺 Shoout! Beer × 5!',jackpot:false};
  if((c['🎰']||0)>=5) return {mult:8, msg:'🎰 Pokies × 5!',jackpot:false};
  if((c['🃏']||0)>=5) return {mult:5, msg:'🃏 Full Hand!',jackpot:false};
  for(const s of Object.keys(c)){
    if(c[s]>=3) return {mult:2,msg:`${s} × ${c[s]} — Small win!`,jackpot:false};
  }
  return {mult:0,msg:'No win — spin again, legend!',jackpot:false};
}

function confetti(n){
  const cols=['#c8922a','#ff6b6b','#4ecdc4','#ffd700','#ff9ff3','#96ceb4'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='confetti';
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*1.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}

function playWin(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [440,550,660].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0.06,ctx.currentTime+i*0.1);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.25);
      o.start(ctx.currentTime+i*0.1);o.stop(ctx.currentTime+i*0.1+0.25);
    });
  }catch(e){}
}

function playJackpot(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784,1047,784,1047,1175,1047,1319,1047];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0.07,ctx.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.3);
      o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.3);
    });
  }catch(e){}
}

function spin(){
  if(spinning) return;
  if(credits<bet){document.getElementById('win-msg').textContent='Not enough credits!';return;}
  spinning=true; credits-=bet;
  updateUI(); updateWin(0);
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('win-msg').textContent='Spinning...';

  const finals=Array.from({length:NREELS},()=>wRand());
  const strips=Array.from({length:NREELS},(_,i)=>document.getElementById('s'+i));
  const n=26;

  strips.forEach((s,i)=>{
    buildStrip(s,finals[i]);
    s.style.transition='none';
    s.style.transform='translateY(0)';
  });

  const delays=[0,200,400,600,800];
  const dur=2000;

  strips.forEach((s,i)=>{
    setTimeout(()=>{
      const target=-((n-3)*CELL_H);
      s.style.transition=`transform ${dur-delays[i]}ms cubic-bezier(0.2,0.5,0.3,1)`;
      s.style.transform=`translateY(${target}px)`;
    },80+delays[i]);
  });

  const last=delays[NREELS-1]+dur;
  setTimeout(()=>{
    const result=calcWin(finals);
    const winAmt=result.mult*bet;
    credits+=winAmt; updateUI(); updateWin(winAmt);
    document.getElementById('win-msg').textContent=result.msg;
    if(result.jackpot){
      setTimeout(()=>{
        document.getElementById('jk-amount').textContent=`+${winAmt} CREDITS`;
        document.getElementById('jackpot-overlay').classList.add('show');
        confetti(100);playJackpot();
      },400);
    } else if(winAmt>0){
      playWin();
      document.getElementById('reels-wrap').classList.add('win-glow');
      setTimeout(()=>document.getElementById('reels-wrap').classList.remove('win-glow'),1400);
    }
    spinning=false;
    document.getElementById('spin-btn').disabled=false;
  },last+150);
}

function updateUI(){
  document.getElementById('cval').textContent=credits;
  document.getElementById('bval').textContent=bet;
}
function updateWin(w){
  document.getElementById('wval').textContent=w;
}

document.getElementById('bet-slider').addEventListener('input',function(){
  bet=parseInt(this.value);
  document.getElementById('bet-disp').textContent=bet;
  updateUI();
});
document.getElementById('max-btn').addEventListener('click',()=>{
  bet=20;document.getElementById('bet-slider').value=20;
  document.getElementById('bet-disp').textContent=20;updateUI();
});
document.getElementById('add-btn').addEventListener('click',()=>{credits+=100;updateUI();});
document.getElementById('spin-btn').addEventListener('click',spin);
document.getElementById('jk-close').addEventListener('click',()=>{
  document.getElementById('jackpot-overlay').classList.remove('show');
});

initReels();updateUI();
</script>
</body>
</html>
